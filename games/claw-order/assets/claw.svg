<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 150" width="180" height="150">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#aeb8c8"/><stop offset=".28" stop-color="#f4f8ff"/>
      <stop offset=".5" stop-color="#c4cedd"/><stop offset=".72" stop-color="#8893a6"/><stop offset="1" stop-color="#5d6678"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef3fb"/><stop offset="1" stop-color="#7a8497"/>
