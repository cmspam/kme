  <path d="M90 44 L90 138 Q98 142 106 138 L100 44 Z" fill="url(#chrome)" stroke="#4b5366" stroke-width="4.5" stroke-linejoin="round"/>
  <path d="M118 38 Q140 78 150 132 Q136 138 128 130 Q120 86 100 50 Z" fill="url(#chrome)" stroke="#4b5366" stroke-width="4.5" stroke-linejoin="round"/>
  <!-- prong tips -->
  <circle cx="40" cy="132" r="9" fill="#cfd8e6" stroke="#4b5366" stroke-width="4"/>
  <circle cx="97" cy="138" r="9" fill="#cfd8e6" stroke="#4b5366" stroke-width="4"/>
  <circle cx="140" cy="132" r="9" fill="#cfd8e6" stroke="#4b5366" stroke-width="4"/>
